name: "Tests Unitarios Manual exec"

on:
    workflow_dispatch:
jobs:
    Tests-unitarios:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: '24'
            - name: Instalando dependências
              run: npm install
            - name: Executando tests unitários
              run: npm run test


